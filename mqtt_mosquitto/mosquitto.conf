 Adatok és naplózás
persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
password_file /mosquitto/config/pwfile

# Titkosítatlan MQTT (opcionális, fejlesztéshez hasznos)
listener 1883
allow_anonymous false

# Titkosított MQTTS
listener 8883
cafile /mosquitto/config/certs/ca.crt
certfile /mosquitto/config/certs/server.crt
keyfile /mosquitto/config/certs/server.key
allow_anonymous false

# Ha azt akarod, hogy a klienseknek is kötelező legyen cert-et küldeniük, állítsd true-ra:
require_certificate false

# Biztonság: Éles környezetben állítsd false-ra és használj password_file-t!
allow_anonymous true